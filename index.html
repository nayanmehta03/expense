    <title>Spendwise</title>
    <style>
        /* Reset default margins and paddings */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Style the iframe to fill the entire viewport */
        iframe {
            display: block; 
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
